name: Playwright Tests

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: tst
        type: choice
        options:
          - tst
          - dev
          - staging
          - production

jobs:
  test:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    # Variables are resolved from GitHub Environment secrets.
    # Set these under: Settings → Environments → <env-name> → Secrets & variables
    environment: ${{ github.event.inputs.environment || 'tst' }}

    env:
      BASE_URL: ${{ vars.BASE_URL }}
      TEST_USERNAME: ${{ secrets.TEST_USERNAME }}
      TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
      AUTH0_DOMAIN: ${{ vars.AUTH0_DOMAIN }}
      TIMEOUT: ${{ vars.TIMEOUT || '20' }}
      CI: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox

      - name: Run smoke tests
        run: npx playwright test --grep @smoke --workers=1

      - name: Run regression tests
        if: github.event_name == 'push'
        run: npm run test:regression

      - name: Generate Allure report
        if: always()
        run: npx allure generate allure-results --clean -o allure-report

      - name: Upload Allure report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-report-${{ github.run_id }}
          path: allure-report/
          retention-days: 14

      - name: Upload Playwright HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ github.run_id }}
          path: reports/html/
          retention-days: 14

      - name: Upload test results (traces/screenshots/videos)
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results-${{ github.run_id }}
          path: test-results/
          retention-days: 7
